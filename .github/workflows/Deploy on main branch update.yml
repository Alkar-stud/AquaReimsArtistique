name: Deploy on main branch update

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Permet de déclencher le workflow manuellement
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3
    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.ftp_host_ara_prod }}
        username: ${{ secrets.user_ara_prod }}
        password: ${{ secrets.ftp_password_ara_prod }}
        exclude: |
          **/.git*
          **/.git*/**
          ChampEmail.md
          Dockerfile
          docker-compose.yml
        server-dir: /          
